name: Build Linux AppImage

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-linux-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            packaging/linux-build-requirements.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install -r packaging/linux-build-requirements.txt

      - name: Run packaging smoke tests
        run: |
          python -m unittest \
            tests.test_ai_model \
            tests.test_ai_workflow \
            tests.test_dinov2_extractor \
            tests.test_freeze_support

      - name: Compile packaging scripts
        run: |
          python -m compileall \
            freeze_support.py \
            setup_linux.py \
            setup_msi.py \
            packaging/ai_python_runner.py

      - name: Build AppImage
        run: python setup_linux.py bdist_appimage

      - name: List build output
        run: ls -lah dist

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-triage-appimage-${{ github.sha }}
          path: dist/*.AppImage
          if-no-files-found: error
          retention-days: 14
